<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- meta tags -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- title -->
    <title>Weather Dashboard</title>
  </head>

  <body>
    <!-- header -->
    <header class="heading">Weather Dashboard</header>
    <!-- main -->
    <main id='container' class="container">
      <div class="row">
        <!-- city search -->
        <div class="col1">
          <div id='search-area'>
            <h1 class='h1'>Search for a City</h1>
            <form id='city-search'>
              <input name='city' type="text" placeholder="City Name" id='city' autofocus='true' class='city-input' />
              <button type="submit" id='search-btn' class='btn'>Search</button>
            </form>
            <!-- thematic break, shift of topic -->
            <hr>
            </hr>
            <!-- clear btn -->
            <div>
              <button class="btn" id="clear">Clear History</button>
            </div>
            <!-- cities previously searched in local storage -->
            <div id="search-history">
            </div>
          </div>
        </div>
        <!-- current weather & 5 day forecast -->
        <div class="col2">
          <div id='five-day' class='row spacebetween'></div>
        </div>
      </div>
    </main>
    <!-- !====================================================================================================================================================================================================== -->
    <!-- popperjs -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <!-- boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-mQ93GR66B00ZXjt0YO5KlohRA5SY2XofN4zfuZxLkoj1gXtW8ANNCe9d5Y3eG5eD" crossorigin="anonymous"></script>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.3.js" integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM=" crossorigin="anonymous"></script>
    <!-- jquery-ui -->
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js" integrity="sha256-xLD7nhI62fcsEZK2/v8LsBcb4lG7dgULkuXoXB/j91c=" crossorigin="anonymous"></script>
    <!-- momentjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <!-- js -->
    <script src="./assets/js/script.js"></script>
  </body>

</html>
