<!doctype html>
<html lang="en">

  <head>
    <title>Title</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>

  <body>
    <header>
      <h1>Weather Dashboard</h1>
    </header>

    <div class="row">
      <div class="col-sm-3">
        <form id="search-cities">
          <h2>Search for a City:</h2>
          <input type="text" id="city">
          <button id="city-search"><i class="fas fa-search-location"></i></button>
        </form>
        <h2 class="search">Search History:</h2>
        <button id="clear-history">Clear</button>
        <div class="col" id="search-history">
          <div class="container" id="container"></div>
        </div>
      </div>

      <div class="col-sm-9" id="weather-data">
        <div class="card weather" id="weather-card">
          <div class="card-body">
            <h2 class="card-title"></h2>
            <p class="card-text" id="temp"></p>
            <p class="card-text" id="humid"></p>
            <p class="card-text" id="wind"></p>
            <p class="card-text"><span id="uvi"></span></p>
          </div>
        </div>
        <h2 id="future-header"></h2>
        <div class="row" id="future-cast"></div>
      </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-mQ93GR66B00ZXjt0YO5KlohRA5SY2XofN4zfuZxLkoj1gXtW8ANNCe9d5Y3eG5eD" crossorigin="anonymous"></script> -->
    <script src="./assets/js/script.js"></script>
  </body>

</html>
