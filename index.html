<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <!-- css -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Weather Dashboard</title>
  </head>

  <body class="bg-info bg-opacity-25">
    <nav class="navbar navbar-expand-lg pb-0">
      <div class="container">
        <span class="navbar-brand mb-0 h1 fs-3">Weather Dashboard</span>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-md-3">
          <div class="row">
            <div class="col-md-12">
              <form class="form">
                <br />
                <input id="location" class="form-control border border-info border-2 shadow-lg" type="text" autocomplete="off" placeholder="Search Location" />
              </form>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="d-grid">
                <button class="btn btn-primary shadow-lg" id="search-btn" type="button" style="margin-top: 20px; margin-bottom: 20px">
                  Search
                </button>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12 mt-2">
              <div class="list-group gap-1 history"></div>
            </div>
          </div>
        </div>
        <div class="col-md-9 flex-column d-flex justify-content-md-around">
          <div class="row gap-3 mt-4">
            <div class="col-md-12 align-items-center bg-info bg-opacity-75 border border-light border-2 rounded text-center position-relative shadow-lg">
              <marquee behavior="scroll" direction="left">
                <img class="icon" src="" alt="" />
              </marquee>
              <h4 class="city"></h4>
            </div>
            <div class="col-md-12 bg-info bg-opacity-75 border border-light border-2 rounded card shadow-lg">
              <div class="weather">
                <h5 class="card-title date fs-1"></h5>
                <p class="card-text"></p>
                <p class="card-text temp"></p>
                <p class="card-text wind"></p>
                <p class="card-text humid"></p>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12 fs-4">
              <p>5 Day Weather Forecast</p>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-md-12">
              <div class="row gap-2">
                <div class="col-md bg-info bg-opacity-75 border border-light border-2 rounded card shadow-lg">
                  <div class="weather">
                    <h5 class="card-title date"></h5>
                    <p class="card-text icon"></p>
                    <p class="card-text temp"></p>
                    <p class="card-text wind"></p>
                    <p class="card-text humid"></p>
                  </div>
                </div>
                <div class="col-md bg-info bg-opacity-75 border border-light border-2 rounded card shadow-lg">
                  <div class="weather">
                    <h5 class="card-title date"></h5>
                    <p class="card-text icon"></p>
                    <p class="card-text temo"></p>
                    <p class="card-text wind"></p>
                    <p class="card-text humid"></p>
                  </div>
                </div>
                <div class="col-md bg-info bg-opacity-75 border border-light border-2 rounded card shadow-lg">
                  <div class="weather">
                    <h5 class="card-title date"></h5>
                    <p class="card-text icon"></p>
                    <p class="card-text temp"></p>
                    <p class="card-text wind"></p>
                    <p class="card-text humid"></p>
                  </div>
                </div>
                <div class="col-md bg-info bg-opacity-75 border border-light border-2 rounded card shadow-lg">
                  <div class="weather">
                    <h5 class="card-title date"></h5>
                    <p class="card-text icon"></p>
                    <p class="card-text temp"></p>
                    <p class="card-text wind"></p>
                    <p class="card-text humid"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-mQ93GR66B00ZXjt0YO5KlohRA5SY2XofN4zfuZxLkoj1gXtW8ANNCe9d5Y3eG5eD" crossorigin="anonymous"></script>
    <!-- moment -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js" integrity="sha512-CryKbMe7sjSCDPl18jtJI5DR5jtkUWxPXWaLCst6QjH8wxDexfRJic2WRmRXmstr2Y8SxDDWuBO6CQC6IE4KTA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- jquery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js" integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- js -->
    <script src="./Assets/js/script.js"></script>
  </body>

</html>
